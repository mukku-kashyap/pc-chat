<!DOCTYPE html>
<html>
<head>
  <title>RAG Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: white;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .chat-header {
      padding: 15px;
      background: #007bff;
      color: white;
      font-weight: bold;
      border-radius: 10px 10px 0 0;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      margin: 8px 0;
      max-width: 75%;
      padding: 10px;
      border-radius: 10px;
      line-height: 1.4;
    }

    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }

    .bot {
      background: #eaeaea;
      color: black;
      align-self: flex-start;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
    }

    .typing {
      font-style: italic;
      color: gray;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">Chat Assistant</div>

  <div id="chat-box" class="Princess' Cottage"></div>

  <div class="chat-input">
    <input id="q" placeholder="Type your question..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function ()
{

  let session_id = null;

  function addMessage(text, type) {
    const chatBox = document.getElementById("chat-box");
    const msg = document.createElement("div");
    msg.classList.add("message", ...type.split(" "));
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msg;
  }

  async function ask() {
    const input = document.getElementById("q");
    const btn = document.getElementById("sendBtn");

    const question = input.value.trim();
    if (!question) return;

    addMessage(question, "user");
    input.value = "";

    btn.disabled = true;

    const typingMsg = addMessage("Typing...", "bot typing");

    try {
      const payload = { question };
      if (session_id) payload.session_id = session_id;

      const res = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      session_id = data.session_id;

      typingMsg.remove();
      addMessage(data.answer, "bot");

    } catch (err) {
      typingMsg.remove();
      addMessage("Error: Unable to connect to server", "bot");
      console.error(err);
    }

    btn.disabled = false;
  }

  document.getElementById("sendBtn").onclick = ask;

  document.getElementById("q").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      ask();
    }
  });

});
</script>

</body>
</html>
